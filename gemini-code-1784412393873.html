<!DOCTYPE html>
<html lang="it">
<head>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      onerror="this.onerror=null;this.href='https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css';">
<style>
  :root{ --pad:14px; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;overscroll-behavior:none;}
  body{
    background:#fff; color:#000;
    font-family:Georgia,"Bookerly","Times New Roman",serif;
    -webkit-font-smoothing:none; overflow:hidden;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    -webkit-user-select:none; user-select:none;
  }
  .digits{ font-family:"Helvetica Neue",Helvetica,Arial,sans-serif; font-weight:700; font-variant-numeric:tabular-nums; letter-spacing:-0.04em; line-height:0.86; }
  .label{ font-family:"Helvetica Neue",Helvetica,Arial,sans-serif; font-size:11px; font-weight:700; letter-spacing:0.22em; text-transform:uppercase; }
  #app{height:100%;display:flex;-webkit-flex-direction:column;flex-direction:column;}
  #map{ -webkit-flex:0 0 55vh; flex:0 0 55vh; min-height:150px; background:#fff; border-bottom:2px solid #000; position:relative; overflow:hidden; -webkit-filter:grayscale(1) contrast(1.15) brightness(1.02); filter:grayscale(1) contrast(1.15) brightness(1.02); }
  #map.dead{ -webkit-filter:none; filter:none; display:flex; -webkit-align-items:center; align-items:center; -webkit-justify-content:center; justify-content:center; font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;font-size:12px; text-align:center;padding:20px;opacity:.55; }
  #mapInner{ position:absolute; top:0; left:0; -webkit-transform-origin:50% 50%; transform-origin:50% 50%; -webkit-transition:-webkit-transform .3s linear; transition:transform .3s linear; }
  #mapAttr{ position:absolute; right:4px; bottom:2px; z-index:1000; pointer-events:none; font-size:9px; background:rgba(255,255,255,.85); color:#000; padding:0 4px; font-family:"Helvetica Neue",Helvetica,Arial,sans-serif; }
  .cursor{ width:34px;height:34px; -webkit-transform-origin:50% 50%; transform-origin:50% 50%; -webkit-transition:-webkit-transform .25s linear; transition:transform .25s linear; }
  .cursor svg{display:block;}
  header{ display:flex; -webkit-align-items:center; align-items:center; -webkit-justify-content:space-between; justify-content:space-between; padding:8px var(--pad); border-bottom:2px solid #000; }
  header .label{font-size:10px;letter-spacing:0.18em;}
  .gps-dots{display:inline-flex;vertical-align:-1px;margin-left:6px;}
  .gps-dots i{width:5px;height:11px;background:#000;display:block;opacity:0.15;margin-left:3px;}
  .gps-dots i:first-child{margin-left:0;}
  .gps-dots i.on{opacity:1;}
  #recenter{ border:2px solid #000;background:#fff; font-family:"Helvetica Neue",Helvetica,Arial,sans-serif; font-size:9.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase; padding:4px 8px;display:none;cursor:pointer; }
  #recenter.show{display:block;}
  .hgroup{display:flex;-webkit-align-items:center;align-items:center;}
  .hgroup > *{margin-left:6px;}
  .hgroup > *:first-child{margin-left:0;}
  .hbtn{ border:2px solid #000;background:#fff; font-family:"Helvetica Neue",Helvetica,Arial,sans-serif; font-size:9.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase; padding:4px 8px;cursor:pointer; }
  .hbtn.active{background:#000;color:#fff;}
  #searchBar,#destBar,#saveBar{display:none;border-bottom:2px solid #000;padding:8px var(--pad);}
  #searchBar.show,#destBar.show,#saveBar.show{display:flex;-webkit-align-items:center;align-items:center;}
  #searchInput,#destInput,#saveTitleInput{ -webkit-flex:1 1 auto;flex:1 1 auto;border:2px solid #000;background:#fff;color:#000; font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;font-size:13px;padding:7px 8px; }
  #searchBar button,#destBar button,#saveBar button{ border:2px solid #000;background:#fff;margin-left:6px; font-family:"Helvetica Neue",Helvetica,Arial,sans-serif; font-size:11px;font-weight:700;padding:7px 10px;cursor:pointer; }
  .leaflet-popup-content-wrapper{ border-radius:18px; border:2px solid #000; box-shadow:none; font-family:"Helvetica Neue",Helvetica,Arial,sans-serif; }
  .leaflet-popup-content{ margin:13px 15px; font-size:12.5px; line-height:1.4; }
  .navPopupBtn{ margin-top:10px; border:2px solid #000; background:#000; color:#fff; font-family:"Helvetica Neue",Helvetica,Arial,sans-serif; font-size:12.5px; font-weight:700; padding:9px 12px; cursor:pointer; display:block; width:100%; border-radius:11px; }
  #navBox{ display:none;position:fixed;left:10px;right:10px;z-index:1200; top:calc(env(safe-area-inset-top) + 8px); background:#fff;color:#000;border:2px solid #000; font-family:"Helvetica Neue",Helvetica,Arial,sans-serif; }
  #navBox.show{display:flex;}
  #navTop{ -webkit-flex:1 1 auto;flex:1 1 auto;display:flex; -webkit-align-items:center;align-items:center;padding:8px 10px; }
  #navArrowWrap{ -webkit-flex:0 0 auto;flex:0 0 auto;width:40px;height:40px;margin-right:10px; display:flex;-webkit-align-items:center;align-items:center; -webkit-justify-content:center;justify-content:center; }
  #navArrowInner{-webkit-transition:-webkit-transform .25s linear;transition:transform .25s linear;}
  #navDistance{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;}
  #navStreet{font-size:11.5px;opacity:.75;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
  #navClose{ -webkit-flex:0 0 auto;flex:0 0 auto;border:0;border-left:2px solid #000;background:#fff; font-size:16px;font-weight:700;padding:8px 12px;cursor:pointer;align-self:stretch; }
  #navProgressWrap{height:5px;background:#fff;border-top:2px solid #000;}
  #navProgressBar{height:100%;background:#000;width:0%;-webkit-transition:width .3s linear;transition:width .3s linear;}
  #dashBoard { display: flex; -webkit-flex: 1 1 auto; flex: 1 1 auto; min-height: 0; }
  .speed { -webkit-flex: 0 0 42%; flex: 0 0 42%; padding: 10px var(--pad); border-right: 2px solid #000; display: flex; -webkit-box-orient: vertical; -webkit-flex-direction: column; flex-direction: column; -webkit-align-items: center; align-items: center; -webkit-justify-content: center; justify-content: center; text-align: center; }
  #speed { font-size: 64px; font-size: clamp(42px, 12vw, 80px); }
  .stats-col { display: flex; -webkit-box-orient: vertical; -webkit-flex-direction: column; flex-direction: column; -webkit-flex: 1 1 auto; flex: 1 1 auto; }
  .stats-row { display: flex; -webkit-flex: 1 1 50%; flex: 1 1 50%; }
  .stats-row:first-child { border-bottom: 2px solid #000; }
  .stat-cell { -webkit-flex: 1 1 50%; flex: 1 1 50%; padding: 8px var(--pad); display: flex; -webkit-box-orient: vertical; -webkit-flex-direction: column; flex-direction: column; -webkit-justify-content: center; justify-content: center; }
  .stat-cell:first-child { border-right: 2px solid #000; }
  .stat-cell .val { font-size: 28px; font-size: clamp(20px, 6vw, 34px); margin-top: 4px; }
  footer{display:flex;border-top:2px solid #000;}
  footer button{ -webkit-appearance:none;appearance:none;background:#fff;color:#000;border:0; border-left:2px solid #000;padding:15px 4px;border-radius:0; font-family:"Helvetica Neue",Helvetica,Arial,sans-serif; font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer; -webkit-flex:1 1 0;flex:1 1 0; }
  footer #btnStart{-webkit-flex:1.7 1 0;flex:1.7 1 0;}
  footer button.primary{background:#000;color:#fff;}
  footer button.off{opacity:.28;}
  #history{ position:fixed;top:0;right:0;bottom:0;left:0;background:#fff;z-index:500; display:none;-webkit-overflow-scrolling:touch;overflow-y:auto; padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
  #history.show{display:block;}
  .ride{border-bottom:2px solid #000;padding:12px var(--pad) 14px;cursor:pointer;}
  .spark{width:100%;height:56px;display:block;margin-bottom:12px;}
</style>
</head>
<body>
<div id="app">
  <div id="map"><div id="mapInner"></div><div id="mapAttr">&copy; OpenStreetMap</div></div>
  <header>
    <span class="label" id="gpsText">GPS in attesa<span class="gps-dots" id="gpsDots"><i></i><i></i><i></i><i></i></span></span>
    <span class="hgroup">
      <button id="recenter">Centra</button>
      <button id="btnSearch" class="hbtn">Cerca</button>
      <button id="btnNav" class="hbtn">Naviga</button>
      <button id="btnPiste" class="hbtn">Piste</button>
    </span>
    <span class="label" id="clock">--:--</span>
  </header>
  <div id="searchBar"><input id="searchInput" type="text" placeholder="Cerca luogo…" autocomplete="off"><button id="searchGo">Vai</button><button id="searchClose">Chiudi</button></div>
  <div id="destBar"><input id="destInput" type="text" placeholder="Destinazione…" autocomplete="off"><button id="destGo">Naviga</button><button id="destClose">Chiudi</button></div>
  <div id="saveBar"><input id="saveTitleInput" type="text" placeholder="Nome uscita" autocomplete="off"><button id="saveConfirm">Salva</button><button id="saveCancel">Annulla</button></div>
  <div id="msg"></div>
  <div id="dashBoard">
    <section class="speed">
      <div class="digits" id="speed">0.0</div>
      <div class="unit"><span class="label">km/h</span><div class="sub" id="speedNote">fermo</div></div>
    </section>
    <div class="stats-col">
      <div class="stats-row">
        <div class="stat-cell"><span class="label">Tempo</span><div class="digits val" id="time">0:00:00</div></div>
        <div class="stat-cell"><span class="label">Distanza</span><div class="digits val" id="dist">0.00<small>km</small></div></div>
      </div>
      <div class="stats-row">
        <div class="stat-cell"><span class="label">Media km/h</span><div class="digits val" id="avg">0.0</div></div>
        <div class="stat-cell"><span class="label">Max km/h</span><div class="digits val" id="max">0.0</div></div>
      </div>
    </div>
  </div>
  <footer>
    <button id="btnStart" class="primary">Avvia</button>
    <button id="btnSave" class="off">Salva</button>
    <button id="btnReset">Azzera</button>
    <button id="btnHist">Storico</button>
  </footer>
</div>
<div id="history"><div class="hbar"><span class="title">Storico</span><button id="histClose">Chiudi</button></div><div id="histBody"></div></div>
<div id="navBox"><div id="navTop"><div id="navArrowWrap"><div id="navArrowInner"></div></div><div id="navInfo"><div id="navDistance">--</div><div id="navStreet">In attesa...</div></div></div><button id="navClose">&times;</button><div id="navProgressWrap"><div id="navProgressBar"></div></div></div>
